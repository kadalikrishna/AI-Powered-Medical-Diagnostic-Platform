services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: diagnostic
      POSTGRES_PASSWORD: diagnostic
      POSTGRES_DB: diagnostic
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata:
